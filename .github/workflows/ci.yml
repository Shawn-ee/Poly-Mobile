name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: poly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d poly_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/poly_test
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://127.0.0.1:3000
      NODE_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm exec -- prisma generate --schema=prisma/schema.prisma

      - name: Validate Prisma schema
        run: npm exec -- prisma validate --schema=prisma/schema.prisma

      - name: Typecheck
        run: npx tsc --noEmit --pretty false --incremental false

      - name: Run Jest smoke tests
        run: npm run test:ci

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Typecheck mobile
        working-directory: mobile
        run: npm run typecheck

      # Playwright is intentionally not part of this first CI phase.
      # Broader DB-backed Jest, Vitest, and browser tests should be added
      # after those suites are isolated and stable in CI.
