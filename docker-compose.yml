version: "3.9"
services:
  db:
    image: postgres:16
    container_name: poly_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polymarket
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymarket"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - poly_pgdata:/var/lib/postgresql/data

volumes:
  poly_pgdata:
